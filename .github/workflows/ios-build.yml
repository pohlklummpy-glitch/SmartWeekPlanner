name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Install dependencies
        run: npm install
      
      - name: Setup Expo
        run: npm install -g expo-cli eas-cli
      
      - name: Expo prebuild
        run: npx expo prebuild --platform ios
      
      - name: Fix Podfile for Expo
        run: |
          cd ios
          # Add Expo pod source at the top of Podfile
          sed -i.bak '1i\
          source '\''https://cdn.cocoapods.org/'\''\
          source '\''https://github.com/expo/expo-podspecs.git'\''\
          ' Podfile
      
      - name: Install CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod setup
          pod repo update
          pod install --repo-update --verbose
      
      - name: Build iOS app
        run: |
          cd ios
          xcodebuild -workspace SmartWeekPlanner.xcworkspace \
            -scheme SmartWeekPlanner \
            -configuration Release \
            -archivePath build/SmartWeekPlanner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      
      - name: Export IPA
        run: |
          cd ios
          xcodebuild -exportArchive \
            -archivePath build/SmartWeekPlanner.xcarchive \
            -exportPath build \
            -exportOptionsPlist exportOptions.plist
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SmartWeekPlanner.ipa
          path: ios/build/SmartWeekPlanner.ipa
